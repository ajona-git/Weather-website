<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>weather-app</title>
  <link rel="icon" type="image/png" href="../assets/weather-app.png">
  <link rel="stylesheet" href="./styles/weather.css">
  <script src="./scripts/weather.js" defer></script>

</head>
<body>
  <main class="weather-app">
    <section class="search-city">
      <input type="text" placeholder="Search city here">
      <button class="search">Search</button>
    <section class="city-weather-conditions">
      <img src="" alt="" class="weather-icon">
      <h1 class="city-temperature">29°C</h1>
      <h1 class="city-name">Abuja</h1>
      <p class="city-time">10:42</p>
      <p class="weather-condition">Bright and Sunny</p>
      <div class="current-wind-humidity">
        <div class="city-wind"><img src="../assets/air_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="wind_speed" title="wind_speed">
        <p class="city-wind-value"></p></div>
        <div class="city-humidity"><img src="../assets/humidity_percentage_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="relative_humidity" title="relative_humidity">
        <p class="city-humidity-value"></p></div>
      </div>
      <div class="humidity-stats">
        <div class="humidity">
          <img src="" alt="">
          <p class="humidity-value"></p>
        </div>
        <div class="wind-speed">
          <img src="" alt="">
          <p class="wind-speed-value"></p>
        </div>
        <div class="cloud-cover">
          <img src="" alt="">
          <p class="cloud-cover-value"></p>
        </div>
      </div>
    </section>
    </section>


    <section class="hourly-weekly-forecast">
      <section class="hourly-forecast">
        <h2>Hourly Forecast</h2>
        <div class="hour-weather-cards">
          <div class="one-hour">
            <p>1PM</p>
            <img src="" alt="">
            <p class="forecast-value">29</p>
            <span>humidity</span>
          </div>

      </section>
      <section class="weekly-forecast">
        <h2>7-day Forecast</h2>

            <p>1PM</p>
